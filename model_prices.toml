# ============================================================
# model_prices.toml — token-stats 模型价格配置
# ============================================================
# 所有价格为 每百万(1M) tokens 的价格
# input_cache_price: 输入 token（缓存命中）价格
# input_no_cache_price: 输入 token（缓存未命中）价格
# output_price: 输出 token 价格
# 未配置的模型在展示时会显示 "-"
# 最后更新: 2026-05-23
#
# 维护方式：
#   1. 在下方按 [模型名] 新增或修改
#   2. provider 写厂商名，currency 写 CNY 或 USD
#   3. 不确定的价格加 note 标注
#   4. 修改后保存即可，token-stats 会自动读取
# ============================================================

